# Default config. Override by passing --config path/to/your.yaml.

session:
  data_dir: sessions
  participant: null
  # Age captured on the title screen alongside the participant name.
  # Kept as a string so the JSON round-trips raw user input (e.g.
  # "65y" or "NA"). An empty value means "not provided".
  age: null

serial:
  port: auto
  baud: 115200
  read_timeout_s: 0.02
  open_retries: 3
  open_retry_delay_s: 1.0
  # Explicit per-hand port assignments. When set, these override the
  # auto plug-order assignment (first detected = right, second = left).
  # Set from the Settings screen on the title page, persisted to
  # config/user_settings.yaml. null means "auto-pick".
  left_port: null
  right_port: null
  vendor_ids:
    - "0x2341"   # Arduino LLC
    - "0x239A"   # Adafruit
    - "0x10C4"   # SiLabs CP210x
    - "0x1A86"   # CH340
    - "0x0403"   # FTDI

fsr:
  num_sensors_per_hand: 4
  sample_rate_hz: 200
  baseline_alpha: 0.02
  value_alpha: 0.35
  on_delta: [45, 90, 45, 45]
  off_delta: [35, 70, 35, 35]
  abs_on_min: [320, 400, 320, 320]
  abs_off_max: [350, 450, 350, 350]
  debounce_ms: 100

bilateral:
  hand: right            # right | left | both
  per_hand_calibration: true

game:
  mode: adaptive         # classic | adaptive | rhythm
  # Classic-mode pacing. 1.2 s between stim onsets + 1.0 s timeout means the
  # patient has up to ~2.2 s per trial, which is comfortable starting pace
  # for most patients. Adaptive mode ignores trigger_interval_s and
  # drives cadence from the engine's BPM instead.
  trigger_interval_s: 1.2
  timeout_s: 1.0
  early_window_s: 0.1
  total_trials: 40
  # Pre-start "GET READY" countdown (seconds) shown before the first
  # stim on the cadence modes (classic / adaptive / mirror). Gives the
  # patient a moment to settle their hand on the device. Rhythm mode
  # uses its own musical lead-in and ignores this. Test mode trims it
  # to keep quick demos quick.
  start_countdown_s: 5.0
  # Test Mode is a supervisor-demo shortcut. When enabled, every block
  # (classic / adaptive / rhythm) is capped at test_mode_trials trials
  # so the full pipeline (mode select -> setup -> gameplay -> results)
  # fits inside a 60-second demo. Rhythm mode trims the beatmap to the
  # first N notes; the audio still plays the full track. Researcher
  # runs should keep test_mode_enabled=false so the trial CSVs hold the
  # normal 40-48-trial blocks. Toggleable from the Settings screen.
  test_mode_enabled: false
  test_mode_trials: 6
  # Unilateral RIGHT-hand keymap. Patient rests their right hand on the
  # home row so j (index finger, closest to centre) is lane 0 and ; (little
  # finger, outer edge) is lane 3. Lanes always go 0=index..3=little.
  keyboard_map:
    j: 0           # right index
    k: 1           # right middle
    l: 2           # right ring
    semicolon: 3   # right little
  # Unilateral LEFT-hand keymap. Patient rests their left hand on the home
  # row so f (index, closest to centre) is lane 0 and a (little, outer
  # edge) is lane 3. Same lane convention as right so the rest of the game
  # logic doesn't care which hand.
  keyboard_map_left:
    f: 0           # left index
    d: 1           # left middle
    s: 2           # left ring
    a: 3           # left little
  # Bilateral keymap (both hands). Lanes 0..3 = right hand, 4..7 = left.
  keyboard_map_bilateral:
    j: 0           # right index
    k: 1           # right middle
    l: 2           # right ring
    semicolon: 3   # right little
    f: 4           # left index
    d: 5           # left middle
    s: 6           # left ring
    a: 7           # left little

adaptive:
  # Start slow so the patient gets confident hits before the system
  # speeds up. Lowered from 60 -> 30 BPM = 2.0 s between stimuli.
  # 60 BPM (1.0 s) was opening the first block above the comfortable
  # press cadence for stroke-rehab patients, which pushed hit-rate
  # below the 65-80% challenge-point band and bounced the engine
  # straight into recovery. From 30 BPM the patient can string a
  # streak together; the engine bumps up by bpm_step every time it
  # sees a sustained hit rate above target_high.
  start_bpm: 30
  bpm_min: 10                 # crawl mode for severe weakness (6s gap)
  bpm_max: 140
  bpm_step: 10                # base step. Scaled up when hit rate is far off.
  target_low: 0.65            # aim for the 65-80% band around the 70% target
  target_high: 0.80
  weakness_bias: 2.5
  min_trials: 2               # react after just two trials, not eight
  block_size: 4               # regenerate the sequence + reweight every 4 trials
  # Timeout scales with cadence so a slow pace gives more time to press.
  # timeout_s = cadence * timeout_factor.
  timeout_factor: 0.90

scoring:
  # Reaction-time bands for classic + adaptive trials. The patient's
  # press is timed from the stim firing; the band determines both the
  # outcome label shown on screen and the points awarded.
  #
  #   RT  <= perfect_ms  -> "Perfect"  +perfect_points
  #   RT  <= great_ms    -> "Great"    +great_points
  #   RT  <= good_ms     -> "Good"     +good_points
  #   RT  >  good_ms     -> "Late"     +late_points
  #   no press           -> "Miss"     +miss_points
  #
  # The 10/6/3/1 spread is intentionally wider than the historical
  # 3/2/1 - that earlier scheme made the difference between a 150 ms
  # press and a 600 ms press only +2 points, which on a single trial
  # was invisible. Now a Perfect is worth 10x a Late so the patient
  # FEELS the variance in real time.
  perfect_ms: 100
  perfect_points: 10
  great_ms: 200
  great_points: 6
  good_ms: 500
  good_points: 3
  late_points: 1
  # Missed trials + early presses default to 0 (score still won't go
  # below zero, the floor is enforced in engine._apply_wrong_penalty).
  miss_points: 0
  early_penalty: 0
  # Wrong-finger press penalty. Subtracts this many points on EVERY
  # wrong-finger press during a trial (classic + adaptive) and on
  # every unmatched press in rhythm mode. Tuned against the wider
  # point spread above: at penalty=3, mashing 3 wrong fingers costs
  # -9, which overwhelms even a great hit (+6). A Perfect (+10) can
  # still net positive with one wrong (+1), but a focused Perfect
  # (+10) always beats the spam outcome - so the dominant strategy
  # is "press one finger fast", not "mash everything". Floored at
  # score=0 so the display never goes negative. Set to 0 to disable.
  wrong_press_penalty: 3
  # Idle-press penalty. Subtracts this many points per press that
  # lands in classic / adaptive while NO trial is active (between
  # stims). Without it, mashing between trials cost nothing because
  # the press handler short-circuited. Detector debounce_ms already
  # rate-limits the spam at the hardware layer, so this just makes
  # each accepted between-trial press cost something. Smaller than
  # wrong_press_penalty (1 vs 3) because a legitimate finger fidget
  # shouldn't punish as hard as actively pressing the wrong key
  # during a trial. Set to 0 to disable.
  idle_press_penalty: 1

mirror:
  # Bilateral coordination is harder than unimanual cued press so
  # mirror opens slower than adaptive (which starts at 30). Patient
  # needs to land both same-finger presses inside the timing window
  # before the system speeds up. The same adaptive.* knobs (target
  # band, bpm_min, bpm_max, bpm_step, weakness_bias) drive how the
  # pace evolves from here.
  start_bpm: 24

rhythm:
  difficulty: medium     # easy | medium | hard
  # Seconds after the visual countdown ends before the audio starts +
  # the first beat is due. Gives the falling-notes visualiser time to
  # ramp in so the patient sees notes sliding down before they need to
  # press one. The 3 s countdown ticking from "3" to "GO" still runs;
  # this is an ADDITIONAL silent ramp on top of it.
  pre_song_lead_s: 2.0
  beat_subset:           # which beats fire per difficulty
    easy: 4              # every 4th beat
    medium: 2            # every 2nd beat
    hard: 1              # every beat
  perfect_ms: 50
  great_ms: 100
  good_ms: 175
  miss_ms: 300
  # Audio-output latency compensation. pygame.mixer's buffer + the OS
  # audio path add ~20-50 ms between when our song_time clock thinks a
  # beat occurs and when the patient actually HEARS it. Without this
  # the patient's "on the beat" press lands as ~40 ms Late even when
  # they're perfectly in time. Default 40 ms is the typical pygame
  # latency on macOS / Windows; bump it up if presses still feel late,
  # or down toward 0 if they feel early.
  audio_offset_ms: 40

audio:
  enabled: true
  master_volume: 0.8
  music_dir: assets/music
  # Per-lane stim cue tone (C, E, G, C, repeating for bilateral) that
  # fires the moment a stim is dispatched in classic + adaptive modes.
  # Matches Aiden's game behaviour. Rhythm mode ignores this and plays
  # the song instead.
  stim_tone_enabled: true

ui:
  resolution: [1280, 800]
  # Boot fullscreen (kiosk-style clinical use). F10 toggles to a
  # windowed view at runtime. The render size stays 1280x800 either
  # way; the display opens with SCALED so it upscales to fit the monitor.
  fullscreen: true
  theme: clinical
  font_scale: 1.0

logging:
  level: INFO
  file: sessions/rehab.log

# Optional pretest / main / aftertest protocol. When `blocks` is a
# non-empty list, calling GameEngine.start_protocol() runs the
# blocks back-to-back with the named `phase` written into each
# trial CSV row's `phase` column. Useful for learning-effects
# studies where you want to compare baseline (pretest) and post-
# training (aftertest) on either side of a main training block.
#
# Default is empty so existing free-play flow is unaffected. To
# enable, override in user_settings.yaml or pass --config a YAML
# like:
#   protocol:
#     blocks:
#       - {mode: classic,  phase: pretest}
#       - {mode: adaptive, phase: main}
#       - {mode: classic,  phase: aftertest}
protocol:
  blocks: []
